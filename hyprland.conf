general {
    border_size = 1
    col.inactive_border = 0xffffffff
    col.active_border = 0xffffffff
    gaps_in = 4
    gaps_out = 4
    float_gaps = 6
    resize_on_border = true
    extend_border_grab_area = 30
}

decoration {
    rounding = 16
    active_opacity = 1.0
    inactive_opacity = 0.95
    blur {
        enabled = true
	size = 8
	passes = 2
	new_optimizations = yes
  	ignore_opacity=true
    }
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}


input {
    kb_layout = us,ru
    kb_options = grp:caps_toggle

    touchpad {
        natural_scroll = true
    }

}

cursor {
    no_warps = true
}

misc {
    font_family = JetBrains Mono
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    # Windows pop in instead of sliding
    animation = windows, 1, 5, myBezier, popin 80%
    animation = windowsOut, 1, 5, myBezier, popin 80%
    # Layers (rofi, waybar) set to fade to remove the up/down slide
    animation = layers, 1, 5, myBezier, fade
    animation = layersIn, 1, 5, myBezier, fade
    animation = layersOut, 1, 5, myBezier, fade
    animation = fade, 1, 5, myBezier
    # Workspaces slide horizontally (standard)
    animation = workspaces, 1, 5, myBezier, slide
    # Special workspaces fade to avoid the vertical slide
    animation = specialWorkspaceIn, 1, 5, myBezier, fade
    animation = specialWorkspaceOut, 1, 5, myBezier, fade
}
# в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ
#  в—Ҳ WINDOW & LAYER RULES
# в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ

layerrule {
    name = "lr1"
    match:namespace = ^(volume_osd)$
    no_anim = on
}

layerrule {
    name = "lr2"
    match:namespace = ^(brightness_osd)$
    no_anim = on
}

layerrule {
    name = "lr3"
    match:namespace = hyprpicker
    no_anim = on
}

layerrule {
    name = "lr4"
    match:namespace = qsdock
    no_anim = on
}

layerrule {
    name = "lr5"
    match:namespace = ext-session-lock
    blur = on
    ignore_alpha = 0.2
}

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Window rules
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ App Launcher в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
windowrule {
    name = "app_launcher"
    match:title = ^(app-launcher)$
    float = on
    center = on
    size = 1200 600
    animation = slide
}

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ MASTER QUICKSHELL CONTAINER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
windowrule {
    name = "master_rule"
    match:title = ^(qs-master)$
    float = on
    no_shadow = on
    no_initial_focus = on
}

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ File dialogs & portals в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
windowrule {
    name = "float_portals"
    match:class = ^(xdg-desktop-portal-gtk|xdg-desktop-portal-gnome|xdg-desktop-portal-kde)$
    float = on
    center = on
    size = 900 600
}

windowrule {
    name = "float_file_dialogs"
    match:title = ^(Open|Save|Save As|Open File|Save File|Open Folder|Choose Files|Select File|Choose File|Browse)(.*)$
    float = on
    center = on
    size = 900 600
}

windowrule {
    name = "float_dialog_class"
    match:class = ^(file-roller|org\.gnome\.FileRoller|nm-connection-editor|pavucontrol|blueman-manager|polkit-gnome-authentication-agent-1|org\.gnome\.polkit|lxpolkit)$
    float = on
    center = on
}


# в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ
#  в—Ҳ KEYBINDINGS
# в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ Mouse & Gestures в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
gesture = 3, horizontal, workspace
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ Window Management в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
bind = $mainMod, Q, exec, bash -c 'if hyprctl activewindow | grep -q "title: qs-master"; then ~/.config/hypr/scripts/qs_manager.sh close; else hyprctl dispatch killactive; fi'
bind = $mainMod&SHIFT_L, F, exec, bash -c 'if ! hyprctl activewindow | grep -q "title: qs-master"; then hyprctl dispatch togglefloating; fi'
binde = $mainMod&SHIFT_L, left, resizeactive,-50 0
binde = $mainMod&SHIFT_L, right, resizeactive,50 0
binde = $mainMod&SHIFT_L, up, resizeactive,0 -50
binde = $mainMod&SHIFT_L, down, resizeactive,0 50
bind = $mainMod&CTRL, left, movewindow, l
bind = $mainMod&CTRL, right, movewindow, r
bind = $mainMod&CTRL, up, movewindow, u
bind = $mainMod&CTRL, down, movewindow, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind=SUPER,F,fullscreen

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ Applications & Launchers в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
bind = $mainMod, T, exec, $terminal
bind = $mainMod, E, exec, chromium
bind = $mainMod, N, exec, nautilus
bind = ALT, TAB, exec, bash ~/.config/hypr/scripts/rofi_show.sh window
bind = $mainMod, C, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle clipboard
bind = $mainMod, A, exec, swaync-client -t -sw

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ Quickshell Controls в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
bind = $mainMod, M, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle music
bind = $mainMod, B, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle battery
bind = $mainMod, W, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle wallpaper
bind = $mainMod, S, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle calendar
bind = $mainMod&SHIFT_L, T, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle focustime
bind = $mainMod, V, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle volume
bind = $mainMod, H, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle guide
bind = $mainMod, SPACE, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle launcher
bind = $mainMod, M, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle monitors

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ System & Hardware в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# bindl = ALT_L, Space, exec, hyprctl switchxkblayout main prev
# bindl = SHIFT_L, ALT_L, exec, hyprctl switchxkblayout main next
bindl = , Caps_Lock, exec, sleep 0.1 && swayosd-client --caps-lock
bindl = , XF86MonBrightnessDown, exec, bash ~/.config/hypr/scripts/osd_brightness.sh down
bindl = , XF86MonBrightnessUp, exec, bash ~/.config/hypr/scripts/osd_brightness.sh up
bindl = , Print, exec, ~/.config/hypr/scripts/screenshot.sh
bindl = SHIFT_L, Print, exec, ~/.config/hypr/scripts/screenshot.sh --edit
bindl = SUPER, Print, exec, ~/.config/hypr/scripts/screenshot.sh --full
bindl = SUPER SHIFT_L, Print, exec, ~/.config/hypr/scripts/screenshot.sh --full --edit
bindl = , XF86PowerOff, exec, bash ~/.config/hypr/scripts/lock.sh
bindel = $mainMod, L, exec, bash ~/.config/hypr/scripts/lock.sh

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ Media & Audio в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
bindl = $mainMod, P, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , xf86AudioMicMute, exec, bash ~/.config/hypr/scripts/osd_volume.sh mic
bindl = , xf86audiomute, exec, bash ~/.config/hypr/scripts/osd_volume.sh mute
bindel = , XF86AudioLowerVolume, exec, bash ~/.config/hypr/scripts/osd_volume.sh down
bindel = , xf86audioraisevolume, exec, bash ~/.config/hypr/scripts/osd_volume.sh up

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ Workspaces в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
bind = $mainMod, 1, exec, ~/.config/hypr/scripts/qs_manager.sh 1
bind = $mainMod, 2, exec, ~/.config/hypr/scripts/qs_manager.sh 2
bind = $mainMod, 3, exec, ~/.config/hypr/scripts/qs_manager.sh 3
bind = $mainMod, 4, exec, ~/.config/hypr/scripts/qs_manager.sh 4
bind = $mainMod, 5, exec, ~/.config/hypr/scripts/qs_manager.sh 5
bind = $mainMod, 6, exec, ~/.config/hypr/scripts/qs_manager.sh 6
bind = $mainMod, 7, exec, ~/.config/hypr/scripts/qs_manager.sh 7
bind = $mainMod, 8, exec, ~/.config/hypr/scripts/qs_manager.sh 8
bind = $mainMod, 9, exec, ~/.config/hypr/scripts/qs_manager.sh 9
bind = $mainMod, 0, exec, ~/.config/hypr/scripts/qs_manager.sh 10

bind = $mainMod SHIFT, 1, exec, ~/.config/hypr/scripts/qs_manager.sh 1 move
bind = $mainMod SHIFT, 2, exec, ~/.config/hypr/scripts/qs_manager.sh 2 move
bind = $mainMod SHIFT, 3, exec, ~/.config/hypr/scripts/qs_manager.sh 3 move
bind = $mainMod SHIFT, 4, exec, ~/.config/hypr/scripts/qs_manager.sh 4 move
bind = $mainMod SHIFT, 5, exec, ~/.config/hypr/scripts/qs_manager.sh 5 move
bind = $mainMod SHIFT, 6, exec, ~/.config/hypr/scripts/qs_manager.sh 6 move
bind = $mainMod SHIFT, 7, exec, ~/.config/hypr/scripts/qs_manager.sh 7 move
bind = $mainMod SHIFT, 8, exec, ~/.config/hypr/scripts/qs_manager.sh 8 move
bind = $mainMod SHIFT, 9, exec, ~/.config/hypr/scripts/qs_manager.sh 9 move
bind = $mainMod SHIFT, 0, exec, ~/.config/hypr/scripts/qs_manager.sh 10 move

# === DOTFILES AUTO-INJECTED ENV ===
env = WALLPAPER_DIR,/home/dxvmxn/Pictures/Wallpapers/
env = SCRIPT_DIR,/home/dxvmxn/.config/hypr/scripts
